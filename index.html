<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jimmy Motors | Bikes & Cars</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="navbar">
        <div class="logo">JIMMY <span>MOTORS</span></div>
        <nav>
            <a href="#home">Home</a>
            <a href="#bikes">Bikes</a>
            <a href="#cars">Cars</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <section class="hero" id="home">
        <h1>DRIVE THE DREAM</h1>
        <p>Premium selection of high-performance vehicles.</p>
        <button class="btn" onclick="scrollToSection('cars')">View Inventory</button>
    </section>

    <section id="bikes">
        <h2>Our Bikes</h2>
        <div class="grid" id="bike-container">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1558981806-ec527fa84c39?w=500" alt="Bike">
                <div class="card-content">
                    <h3>Thunder R1</h3>
                    <p>$12,900</p>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1568772585407-9361f9bf3a87?w=500" alt="Bike">
                <div class="card-content">
                    <h3>Iron Cruiser</h3>
                    <p>$15,500</p>
                </div>
            </div>
        </div>
    </section>

    <section id="cars">
        <h2>Our Cars</h2>
        <div class="grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=500" alt="Car">
                <div class="card-content">
                    <h3>GT Spectre</h3>
                    <p>$89,000</p>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1494976388531-d1058494cdd8?w=500" alt="Car">
                <div class="card-content">
                    <h3>Executive S</h3>
                    <p>$62,000</p>
                </div>
            </div>
        </div>
    </section>

    <footer id="contact">
        <div class="footer-grid">
            <div>
                <h3>Jimmy Motors</h3>
                <p>123 Speed Way, Turbo City</p>
            </div>
            <form id="contactForm">
                <input type="text" placeholder="Your Name" required>
                <button type="submit">Contact Us</button>
            </form>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
